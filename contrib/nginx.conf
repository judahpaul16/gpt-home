worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Backend API (FastAPI running in app container)
    upstream backend {
        server app:8000;
        keepalive 32;
    }

    # Static frontend (web container in prod, or web-dev in dev)
    upstream frontend {
        server web:80;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # API routes - proxy to backend (app container)
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        # SSE endpoint - critical settings for Server-Sent Events
        location /logs/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Critical SSE settings - MUST disable all buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            
            # Disable nginx buffering at TCP level
            proxy_request_buffering off;
            
            # Long timeouts for persistent SSE connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # Pass through X-Accel-Buffering header from app
            proxy_pass_header X-Accel-Buffering;
            
            # No body size limits
            client_max_body_size 0;
        }

        # Other backend routes - all POST/GET API endpoints
        location ~ ^/(logs|chat|get-local-ip|gptRestart|spotifyRestart|reboot|shutdown|clearMemory|speechCapabilities|availableModels|updateModel|hashPassword|getHashedPassword|setHashedPassword|changePassword|connect-service|disconnect-service|get-service-statuses|spotify-token-exists|reauthorize-spotify|spotify-control|new-logs|clear-logs|health-check)$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        # Static files - proxy to frontend (web container)
        # Frontend handles SPA routing (serves index.html for all non-file routes)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
