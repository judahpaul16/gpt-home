# ALSA configuration for GPT Home
# This is the default fallback configuration.
# The backend will generate a proper config when the user selects an audio device,
# or when HDMI auto-detection runs at startup.
#
# This default uses the system default device.

pcm.!default {
    type plug
    slave.pcm "default"
}

ctl.!default {
    type hw
    card 0
}
