# ALSA configuration for GPT Home
# This is the default fallback configuration.
# The backend will generate a proper config when the user selects an audio device,
# or when HDMI auto-detection runs at startup.
#
# Uses dmix for shared playback (allows TTS and Spotify to play simultaneously).

pcm.dmixer {
    type dmix
    ipc_key 1024
    ipc_perm 0666
    slave {
        pcm "hw:0,0"
        rate 48000
        format S16_LE
        channels 2
        period_size 1024
        buffer_size 4096
    }
}

pcm.!default {
    type plug
    slave.pcm "dmixer"
}

ctl.!default {
    type hw
    card 0
}
