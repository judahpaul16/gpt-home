services:
    db:
        image: pgvector/pgvector:0.8.1-pg18-trixie
        restart: unless-stopped
        env_file: .env
        network_mode: host
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-gpt_home}
            POSTGRES_USER: ${POSTGRES_USER:-gpt_home}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpt_home_secret}
            PGDATA: /var/lib/postgresql/data
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-gpt_home} -d ${POSTGRES_DB:-gpt_home_db} -h 127.0.0.1 -p 5432",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        network_mode: host
        volumes:
            - ./contrib/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            backend:
                condition: service_started
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
            interval: 30s
            timeout: 10s
            retries: 3

    frontend:
        image: judahpaul/gpt-home-frontend:latest
        build:
            context: .
            dockerfile: compose/frontend/Dockerfile
            platforms:
                - linux/arm64
        platform: linux/arm64
        restart: unless-stopped
        profiles:
            - prod
        network_mode: host
        expose:
            - "80"

    frontend-dev:
        build:
            context: .
            dockerfile: compose/frontend/Dockerfile.dev
        restart: unless-stopped
        profiles:
            - dev
        environment:
            CHOKIDAR_USEPOLLING: "true"
            PORT: "3000"
        volumes:
            - ./src/frontend:/app
            - frontend-dev-node-modules:/app/node_modules
            - ./.git:/app/.git:ro
        network_mode: host
        expose:
            - "80"

    backend:
        image: judahpaul/gpt-home-backend:latest
        build:
            context: .
            dockerfile: compose/backend/Dockerfile
            platforms:
                - linux/arm64
        platform: linux/arm64
        restart: unless-stopped
        env_file: .env
        stdin_open: true
        tty: true
        network_mode: host
        pid: host
        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER:-gpt_home}:${POSTGRES_PASSWORD:-gpt_home_secret}@127.0.0.1:5432/${POSTGRES_DB:-gpt_home_db}
            SDL_VIDEODRIVER: kmsdrm
            SDL_KMSDRM_REQUIRE_DRM_MASTER: "0"
        volumes:
            - ./src/settings.json:/app/src/settings.json
            - ./.env:/app/.env
            - /etc/localtime:/etc/localtime:ro
            - /etc/timezone:/etc/timezone:ro
            - /dev/shm:/dev/shm
            - /usr/share/alsa:/usr/share/alsa
            - /var/run/docker.sock:/var/run/docker.sock
            - /sys/class/graphics:/sys/class/graphics:ro
            - /sys/class/drm:/sys/class/drm:ro
            - /run/gpt-home:/run/gpt-home:ro
            - /boot:/boot
            - spotifyd-cache:/root/.spotifyd/cache:ro
            - /run/dbus:/host/run/dbus:ro
        depends_on:
            db:
                condition: service_healthy
        devices:
            - /dev/snd:/dev/snd
            - /dev/i2c-1:/dev/i2c-1
            - /dev/dri:/dev/dri
        privileged: true
        security_opt:
            - apparmor:unconfined
        expose:
            - "8000"

    spotify:
        image: judahpaul/gpt-home-spotify:latest
        build:
            context: .
            dockerfile: compose/spotify/Dockerfile
            platforms:
                - linux/arm64
            args:
                HOST_UID: ${HOST_UID:-1000}
        platform: linux/arm64
        restart: unless-stopped
        network_mode: host
        environment:
            ALSA_CARD: "default"
            PULSE_SERVER: ""
        volumes:
            - /dev/shm:/dev/shm
            - /usr/share/alsa:/usr/share/alsa
            - /etc/alsa:/etc/alsa:ro
            - spotifyd-cache:/root/.spotifyd/cache
            - /run/dbus:/host/run/dbus
        devices:
            - /dev/snd:/dev/snd
        privileged: true

volumes:
    postgres-data:
    frontend-dev-node-modules:
    backend-logs:
    spotifyd-cache:
